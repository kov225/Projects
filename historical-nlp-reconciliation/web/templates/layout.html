<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historical NLP | Reconciliation Suite</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="brand">KB27 Engine</div>
            <nav>
                <ul class="nav-links">
                    <li><a href="/" class="nav-item {{ 'active' if request.path == '/' else '' }}">Dashboard</a></li>
                    <li><a href="/reconciliation" class="nav-item {{ 'active' if 'reconciliation' in request.path else '' }}">Reconciliation</a></li>
                </ul>
            </nav>
            <div style="margin-top: auto; padding-top: 2rem; border-top: 1px solid var(--border);">
                <div style="font-size: 0.75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; margin-bottom: 0.5rem;">Pipeline Status</div>
                <div style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; color: var(--success); font-weight: 600;">
                    <span style="display: block; width: 8px; height: 8px; background: var(--success); border-radius: 50%;"></span>
                    Operational
                </div>
            </div>
        </aside>
        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
