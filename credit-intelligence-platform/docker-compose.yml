version: "3.9"

networks:
  credit_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mlflow_data:
  grafana_data:
  prometheus_data:

services:

  # ── FastAPI scoring service ────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - FRED_API_KEY=${FRED_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - EXPLANATION_BACKEND=${EXPLANATION_BACKEND:-ollama}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - CHALLENGER_TRAFFIC_PCT=${CHALLENGER_TRAFFIC_PCT:-0.2}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-credit_intelligence}
      - POSTGRES_USER=${POSTGRES_USER:-credit_app}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_TTL_SECONDS=${REDIS_TTL_SECONDS:-3600}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_EXPERIMENT_NAME=${MLFLOW_EXPERIMENT_NAME:-credit_intelligence}
      - CHAMPION_MODEL_NAME=${CHAMPION_MODEL_NAME:-credit_risk_champion}
      - CHALLENGER_MODEL_NAME=${CHALLENGER_MODEL_NAME:-credit_risk_challenger}
      - ARTIFACT_DIR=/app/models/artifacts
      - DECISION_THRESHOLD=0.5
    volumes:
      - ./models/artifacts:/app/models/artifacts:ro
      - ./features:/app/features:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - credit_net
    restart: unless-stopped
    command: uvicorn serving.api:app --host 0.0.0.0 --port 8000 --workers 4

  # ── Automated retraining scheduler ────────────────────────────────────────
  retrain_scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-credit_intelligence}
      - POSTGRES_USER=${POSTGRES_USER:-credit_app}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - RETRAIN_CHECK_INTERVAL_HOURS=${RETRAIN_CHECK_INTERVAL_HOURS:-6}
      - PSI_THRESHOLD=${PSI_THRESHOLD:-0.2}
      - AUC_DROP_THRESHOLD=${AUC_DROP_THRESHOLD:-0.03}
      - MIN_AUC_IMPROVEMENT=${MIN_AUC_IMPROVEMENT:-0.005}
      - TRAINING_DATA_PATH=/app/data/processed/loans_clean.parquet
    volumes:
      - ./data/processed:/app/data/processed:ro
      - ./models/artifacts:/app/models/artifacts
    depends_on:
      - postgres
      - api
    networks:
      - credit_net
    restart: unless-stopped
    command: python -m monitoring.retrain_trigger

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-credit_intelligence}
      POSTGRES_USER: ${POSTGRES_USER:-credit_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - credit_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-credit_app} -d ${POSTGRES_DB:-credit_intelligence}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis feature store ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - credit_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Kafka + Zookeeper ──────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - credit_net
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - credit_net
    restart: unless-stopped

  # ── MLflow tracking server ─────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql://${POSTGRES_USER:-credit_app}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-credit_intelligence}
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - credit_net
    restart: unless-stopped
    command: >
      mlflow server
        --backend-store-uri postgresql://${POSTGRES_USER:-credit_app}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-credit_intelligence}
        --default-artifact-root /mlflow/artifacts
        --host 0.0.0.0
        --port 5000

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - credit_net
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana_dashboard.json:/var/lib/grafana/dashboards/credit_intelligence.json:ro
    depends_on:
      - prometheus
    networks:
      - credit_net
    restart: unless-stopped
